<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROBE-OS v6.0</title>
    <link rel="stylesheet" href="./src/style.css">
</head>
<body>
    <div id="stats">
        <div>TIME: <span id="val-time">0</span> min</div>
        <div>TETHER: <span id="val-len">0</span>/<span id="val-max-len">35</span></div>
        <div>CARGO: <span id="val-res">0</span></div>
    </div>
    <div id="log">SYSTEM READY.</div>
    <div id="game-screen"></div>
    <input type="file" id="import-input" accept=".json" style="display:none"></input>
    <button id="btn-import" style="background:rgba(0,20,0,0.8);border:1px solid #55ff55;color:#55ff55;padding:5px 10px;margin-top:5px;cursor:pointer;font-family:'Courier New',monospace;">IMPORT SAVE</button>

    <div class="ctrl-layer">
        <div class="d-pad">
            <div></div><div class="btn" id="btn-up">↑</div><div></div>
            <div class="btn" id="btn-left">←</div><div class="btn" id="btn-down">↓</div><div class="btn" id="btn-right">→</div>
        </div>
        <div class="btn action-btn" id="btn-exec">EXEC</div>
    </div>

    <!-- 核心：以模块形式加载 JS -->
    <script type="module" src="./src/main.js"></script>
</body>
</html>
